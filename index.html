<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Expenses Tracker</h1>

        <!-- Budget Section -->
        <div class="budget-section">
            <label for="budget">Set Budget: ₹</label>
            <input type="number" id="budget" placeholder="Enter total budget">
            <button onclick="setBudget()">Set</button>

            <p><strong>Total Budget:</strong> ₹<span id="totalBudget">0</span></p>
            <p><strong>Remaining:</strong> ₹<span id="remaining">0</span></p>
        </div>

        <!-- Expense Form -->
        <form id="expenseForm">
            <h2>Add Expense</h2>
            <input type="text" id="name" placeholder="Expense Name" required>
            <input type="number" id="amount" placeholder="Amount (₹)" required>
            <input type="text" id="category" placeholder="Category" required>
            <button type="submit">Add Expense</button>
        </form>

        <!-- Expense Table -->
        <h2>Expense List</h2>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Amount (₹)</th>
                    <th>Category</th>
                </tr>
            </thead>
            <tbody id="expenseTable"></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
